<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structogram viewer</title>
    <link rel="stylesheet" href="../css/structoview.css">
    <link rel="stylesheet" href="../css/button.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/structoview.js"></script>
</head>
<body class="structoview-dark">

<div class="ui-controls no-print">
    <button onclick="window.print()" class="btn-macchiato">Save as PDF</button>
    
    <div class="slider-container">
        <label for="zoomSlider">Zoom</label>
        <input type="range" id="zoomSlider" class="zoom-slider" min="0.4" max="1.5" step="0.05" value="1" oninput="updateZoom(this.value)">
        <span id="zoomValue">100%</span>
    </div>
</div>

<main>
    <div id="zoom-content">
        @body
    </div>
</main>

<script src="../js/zoom.js"> </script>

</body>
</html>
